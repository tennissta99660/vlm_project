# LLaMA-Factory — Export / Merge LoRA into base model
# Run from inside LLaMA-Factory/:
#   llamafactory-cli export ../configs/export_lora.yaml

model_name_or_path: llava-hf/llava-v1.6-mistral-7b-hf
adapter_name_or_path: ../outputs/lora_vit
template: llava1_5
finetuning_type: lora
export_dir: ../outputs/lora_vit/merged
export_size: 4           # shard size in GB (4 = ~4 files for 7B model)
export_device: cpu       # merge on CPU to avoid VRAM limits
export_legacy_format: false
trust_remote_code: true
